<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5ebd9"/>
      <stop offset="100%" stop-color="#ebdfc5"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.12 0 0 0 0 0.08 0 0 0 0 0.06 0 0 0 0.05 0"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" filter="url(#grain)" opacity="0.6"/>

  <text x="80" y="120" font-family="'Gowun Batang', 'Noto Serif KR', serif" font-size="36" fill="#7c6f5c" letter-spacing="6">STUDY · CERTIFICATION</text>
  <text x="80" y="280" font-family="'Gowun Batang', 'Noto Serif KR', serif" font-size="180" font-weight="700" fill="#1a1410">기출</text>
  <text x="80" y="430" font-family="'Gowun Batang', 'Noto Serif KR', serif" font-size="120" font-style="italic" fill="#b91c1c">연습장</text>

  <text x="80" y="540" font-family="'Pretendard', 'Noto Sans KR', sans-serif" font-size="28" fill="#3a3027">사회조사분석사 · 공인중개사 · 정보처리기사</text>
  <text x="80" y="580" font-family="'Pretendard', 'Noto Sans KR', sans-serif" font-size="22" fill="#7c6f5c">기출 · 해설 · 오답노트 · PWA</text>

  <g transform="translate(960 120)">
    <circle r="80" fill="#a04020"/>
    <text x="0" y="20" text-anchor="middle" font-family="'Gowun Batang', serif" font-size="80" font-weight="700" fill="#f5ebd9">調</text>
  </g>
</svg>
