<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="p" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5ebd9"/>
      <stop offset="1" stop-color="#e6d6b0"/>
    </linearGradient>
    <filter id="n">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.12 0 0 0 0 0.08 0 0 0 0 0.06 0 0 0 0.08 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#p)"/>
  <rect width="512" height="512" rx="112" fill="#000" filter="url(#n)" opacity="0.6"/>
  <!-- vermillion seal block -->
  <rect x="352" y="60" width="100" height="100" rx="6" fill="#b91c1c"/>
  <text x="402" y="132" font-family="'Gowun Batang', 'Noto Serif KR', serif"
        font-size="64" font-weight="700" fill="#f5ebd9"
        text-anchor="middle" letter-spacing="-3">調</text>
  <!-- main korean title -->
  <text x="60" y="260" font-family="'Gowun Batang', 'Noto Serif KR', serif"
        font-size="140" font-weight="700" fill="#1a1410" letter-spacing="-5">조분</text>
  <text x="60" y="400" font-family="'Gowun Batang', 'Noto Serif KR', serif"
        font-size="140" font-weight="700" fill="#1a1410" letter-spacing="-5">2급</text>
  <!-- bottom accent line -->
  <rect x="60" y="440" width="80" height="6" fill="#b91c1c"/>
</svg>
