<style>
/* ---- theme tokens ---- */
:root {
  --paper:        #f5ebd9;
  --paper-deep:   #ebdfc5;
  --paper-edge:   #ddc9a3;
  --paper-chip:   #e2d4b4;
  --ink:          #1a1410;
  --ink-soft:     #3a3027;
  --ink-mute:     #7c6f5c;
  --ink-faint:    #b8ab94;
  --vermilion:    #b91c1c;
  --vermilion-deep: #8a1313;
  --jade:         #3d6b4a;
  --seal:         #a04020;
  --bar-blur:     color-mix(in srgb, var(--paper) 78%, transparent);
  --tap:          color-mix(in srgb, var(--ink) 5%, transparent);
  --grain: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 300 300'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.12 0 0 0 0 0.08 0 0 0 0 0.06 0 0 0 0.05 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  --serif: 'Gowun Batang', 'Noto Serif KR', 'Noto Sans KR', 'Nanum Myeongjo', serif;
  --sans:  'Pretendard Variable', 'Pretendard', 'Noto Sans KR', 'Apple SD Gothic Neo', system-ui, sans-serif;
  --mono:  'Space Mono', 'Pretendard Variable', 'Pretendard', 'Noto Sans KR', ui-monospace, monospace;
  --spring: cubic-bezier(.2,.9,.25,1.02);
  --ease:   cubic-bezier(.2,.7,.3,1);
  --shadow-lift: 0 1px 0 rgba(52,35,20,.05), 0 10px 28px -18px rgba(52,35,20,.22);
  --shadow-bar:  0 -1px 0 var(--paper-edge);
  --r-sm: 10px; --r-md: 14px; --r-lg: 20px; --r-xl: 28px;
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --paper: #151210;
    --paper-deep: #1d1916;
    --paper-edge: #2e2822;
    --paper-chip: #25211d;
    --ink: #f1e9d7;
    --ink-soft: #d4c8b0;
    --ink-mute: #9c8f78;
    --ink-faint: #554a3c;
    --vermilion: #e85454;
    --vermilion-deep: #b93232;
    --jade: #7aaf89;
    --seal: #c56a44;
    --bar-blur: color-mix(in srgb, var(--paper) 70%, transparent);
    --tap: color-mix(in srgb, var(--ink) 8%, transparent);
    --grain: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 300 300'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.92 0 0 0 0 0.86 0 0 0 0 0.73 0 0 0 0.04 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
}
:root[data-theme="dark"] {
  --paper: #151210;
  --paper-deep: #1d1916;
  --paper-edge: #2e2822;
  --paper-chip: #25211d;
  --ink: #f1e9d7;
  --ink-soft: #d4c8b0;
  --ink-mute: #9c8f78;
  --ink-faint: #554a3c;
  --vermilion: #e85454;
  --vermilion-deep: #b93232;
  --jade: #7aaf89;
  --seal: #c56a44;
  --bar-blur: color-mix(in srgb, var(--paper) 70%, transparent);
  --tap: color-mix(in srgb, var(--ink) 8%, transparent);
  --grain: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 300 300'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.92 0 0 0 0 0.86 0 0 0 0 0.73 0 0 0 0.04 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
html { background: var(--paper); --read-scale: 1; }
html[data-fs="sm"] { --read-scale: 0.92; }
html[data-fs="lg"] { --read-scale: 1.18; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  position: fixed; inset: 0;
  overscroll-behavior: none;
  touch-action: manipulation;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: var(--grain);
  opacity: .55;
  mix-blend-mode: multiply;
  pointer-events: none;
  z-index: 0;
}

button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; -webkit-appearance: none; appearance: none; padding: 0; }
a { color: inherit; text-decoration: none; }

/* ===================================================================
   App shell: stacked screens (for push/pop) + bottom tab bar
   =================================================================== */
#shell {
  position: relative;
  z-index: 1;
  height: 100%;
  display: grid;
  grid-template-rows: 1fr auto;
  overflow: hidden;
}
#stack {
  position: relative;
  overflow: hidden;
}
.screen {
  position: absolute; inset: 0;
  background: var(--paper);
  overflow: hidden;
  display: flex; flex-direction: column;
  will-change: transform;
}

/* Push/pop transitions */
.screen.enter-right  { animation: push-in .32s var(--spring) both; }
.screen.exit-right   { animation: pop-out  .28s var(--ease)   both; pointer-events: none; }
.screen.exit-scale   { animation: scale-out .28s var(--ease) both; pointer-events: none; }
.screen.enter-scale  { animation: scale-in .32s var(--spring) both; }
.screen.enter-sheet  { animation: sheet-in .36s var(--spring) both; }
.screen.exit-sheet   { animation: sheet-out .26s var(--ease)   both; pointer-events: none; }

@keyframes push-in { from { transform: translate3d(100%,0,0); } to { transform: translate3d(0,0,0); } }
@keyframes pop-out { to   { transform: translate3d(100%,0,0); } }
@keyframes scale-in  { from { transform: scale(1.02); opacity: 0; } to { transform: scale(1); opacity: 1; } }
@keyframes scale-out { to   { transform: scale(.98); opacity: 0; } }
@keyframes sheet-in  { from { transform: translate3d(0,100%,0); } to { transform: translate3d(0,0,0); } }
@keyframes sheet-out { to   { transform: translate3d(0,100%,0); } }
@keyframes fade-in   { from { opacity: 0; } to { opacity: 1; } }

/* ===================================================================
   Nav bar (iOS-style with blur)
   =================================================================== */
.nav {
  position: relative;
  z-index: 10;
  display: grid;
  grid-template-columns: 56px 1fr 56px;
  align-items: center;
  padding: calc(env(safe-area-inset-top) + 6px) 4px 10px;
  background: var(--bar-blur);
  backdrop-filter: saturate(180%) blur(16px);
  -webkit-backdrop-filter: saturate(180%) blur(16px);
  border-bottom: 1px solid transparent;
  transition: border-color .2s ease;
}
.nav.is-scrolled { border-bottom-color: var(--paper-edge); }
.nav-title {
  text-align: center;
  font-family: var(--serif);
  font-weight: 700;
  font-size: 16px;
  letter-spacing: -.01em;
  color: var(--ink);
  opacity: 0;
  transition: opacity .2s ease;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.nav.is-scrolled .nav-title { opacity: 1; }
.nav.has-title .nav-title { opacity: 1; }
.nav-sub {
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: .12em;
  color: var(--ink-mute);
  text-transform: uppercase;
  display: block;
  margin-top: 1px;
}

.icon-btn {
  width: 44px; height: 44px;
  display: grid; place-items: center;
  border-radius: 50%;
  color: var(--ink);
  transition: background .15s ease, transform .1s ease;
  position: relative;
}
.icon-btn svg { width: 22px; height: 22px; stroke-width: 1.8; }
.icon-btn:active { background: var(--tap); transform: scale(.94); }

/* scroll body */
.scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  padding: 0 0 calc(72px + env(safe-area-inset-bottom));
}

/* ===================================================================
   Large title (iOS-style)
   =================================================================== */
.large-title {
  padding: 6px 20px 18px;
}
.large-title h1 {
  font-family: var(--serif);
  font-weight: 700;
  font-size: 34px;
  line-height: 1.05;
  letter-spacing: -.02em;
  margin: 0 0 4px;
}
.large-title h1 em { font-style: normal; color: var(--vermilion); }
.large-title .kicker {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: .18em;
  color: var(--ink-mute);
  text-transform: uppercase;
}

/* Stat row */
.stat-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  padding: 0 20px 18px;
}
.stat {
  background: var(--paper-deep);
  border: 1px solid var(--paper-edge);
  border-radius: var(--r-md);
  padding: 14px 12px;
  display: flex; flex-direction: column; gap: 2px;
  transition: transform .1s ease;
}
.stat:active { transform: scale(.98); }
.stat .n {
  font-family: var(--serif);
  font-weight: 700;
  font-size: 22px;
  color: var(--ink);
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.stat .l {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .12em;
  color: var(--ink-mute);
  text-transform: uppercase;
  white-space: nowrap;
}

/* Section header */
.section-head {
  padding: 6px 20px 8px;
  display: flex; align-items: baseline; justify-content: space-between;
}
.section-head h2 {
  font-family: var(--serif);
  font-weight: 700;
  font-size: 18px;
  margin: 0;
  letter-spacing: -.01em;
  display: flex; align-items: center; gap: 10px;
}
.section-head h2::before {
  content: ''; width: 4px; height: 16px;
  background: var(--vermilion);
  border-radius: 2px;
}
.section-head .meta {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink-mute);
  letter-spacing: .14em;
  text-transform: uppercase;
}

/* Group list (iOS inset grouped) */
.group {
  margin: 4px 16px 20px;
  background: var(--paper-deep);
  border: 1px solid var(--paper-edge);
  border-radius: var(--r-lg);
  overflow: hidden;
}
.row {
  display: grid;
  grid-template-columns: 54px 1fr auto;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  min-height: 56px;
  border-bottom: 1px solid var(--paper-edge);
  transition: background .12s ease;
  text-align: left;
  width: 100%;
}
.row:last-child { border-bottom: 0; }
.row:active { background: var(--tap); }
.row-lead {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .08em;
  color: var(--ink-mute);
  background: var(--paper-chip);
  border-radius: 999px;
  padding: 4px 8px;
  text-align: center;
}
.row-lead.icon {
  padding: 0;
  width: 36px; height: 36px;
  background: var(--paper-chip);
  border-radius: 12px;
  display: grid; place-items: center;
  color: var(--ink-soft);
}
.row-lead.icon svg { width: 18px; height: 18px; }
.row-lead.icon.danger { color: var(--vermilion); }
.row-lead.exam-mark {
  width: 52px; height: 52px;
  background: var(--paper-chip);
  border-radius: 14px;
  display: grid; place-items: center;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 700;
  color: var(--vermilion);
  letter-spacing: -.02em;
  text-align: center;
  line-height: 1.05;
}
.row.exam-row { min-height: 72px; grid-template-columns: 64px 1fr auto; }
.row.exam-row .row-title { font-size: 17px; }
.row-body {
  min-width: 0;
  display: flex; flex-direction: column; gap: 2px;
}
.row-title {
  font-family: var(--serif);
  font-weight: 700;
  font-size: 16px;
  letter-spacing: -.01em;
  color: var(--ink);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.row-sub {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--ink-mute);
  letter-spacing: .05em;
}
.row-trail {
  display: flex; flex-direction: column; align-items: flex-end; gap: 5px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-mute);
  font-variant-numeric: tabular-nums;
}
.pill {
  padding: 3px 10px;
  border-radius: 999px;
  background: var(--paper-chip);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .06em;
  color: var(--ink-mute);
}
.pill.done { background: color-mix(in srgb, var(--jade) 22%, var(--paper-chip)); color: var(--jade); }
.pill.active { background: color-mix(in srgb, var(--vermilion) 20%, var(--paper-chip)); color: var(--vermilion); }
.pill.warn { background: color-mix(in srgb, var(--seal) 25%, var(--paper-chip)); color: var(--seal); }
.subj-chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 4px 12px; border-bottom: 1px solid var(--paper-edge); margin-bottom: 12px; }
.subj-chips .chip {
  padding: 6px 12px;
  border-radius: 999px;
  background: var(--paper-chip);
  font-size: 12px;
  color: var(--ink);
}
.subj-chips .chip:active { transform: scale(.96); }

.search-bar {
  display: flex; align-items: center; gap: 8px;
  margin: 8px 16px 12px;
}
.search-bar input[type="search"] {
  flex: 1; min-width: 0;
  padding: 10px 14px;
  background: var(--paper-deep);
  border: 1px solid var(--paper-edge);
  border-radius: var(--r-md);
  font-family: var(--sans);
  font-size: 14px;
  color: var(--ink);
  outline: none;
  -webkit-appearance: none; appearance: none;
}
.search-bar input[type="search"]::placeholder { color: var(--ink-faint); }
.search-bar .seg button { font-size: 11px; padding: 6px 10px; }
.empty { padding: 32px 16px; text-align: center; color: var(--ink-mute); font-size: 13px; }
.chev {
  width: 14px; height: 14px;
  color: var(--ink-faint);
  flex-shrink: 0;
}

/* Empty state */
.empty {
  padding: 60px 32px;
  text-align: center;
  color: var(--ink-mute);
}
.empty .ideo {
  display: block;
  font-family: var(--serif);
  font-size: 56px;
  color: var(--vermilion);
  margin-bottom: 14px;
  line-height: 1;
}
.empty h4 {
  font-family: var(--serif);
  font-size: 18px;
  color: var(--ink);
  margin: 0 0 6px;
}
.empty p {
  margin: 0;
  font-size: 13px;
}

/* ===================================================================
   Tab bar
   =================================================================== */
.tabbar {
  position: relative;
  z-index: 20;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  background: var(--bar-blur);
  backdrop-filter: saturate(180%) blur(16px);
  -webkit-backdrop-filter: saturate(180%) blur(16px);
  border-top: 1px solid var(--paper-edge);
  padding-bottom: env(safe-area-inset-bottom);
}
.tabbar button {
  display: grid; place-items: center; gap: 2px;
  padding: 8px 0 6px;
  color: var(--ink-mute);
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: .08em;
  transition: color .15s ease;
  position: relative;
}
.tabbar svg { width: 22px; height: 22px; stroke-width: 1.6; }
.tabbar button.on { color: var(--vermilion); }
.tabbar button.on::before {
  content: '';
  position: absolute;
  top: 6px; left: 50%;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--vermilion);
  transform: translateX(-50%);
}
.tabbar .label { letter-spacing: .02em; font-weight: 500; }

/* hide tabbar when in quiz (screen marked no-tabs) */
#shell.hide-tabs .tabbar { display: none; }

/* ===================================================================
   Quiz view
   =================================================================== */
.quiz-nav-title {
  display: flex; flex-direction: column;
  align-items: center;
  line-height: 1.15;
}
.quiz-nav-title .d {
  font-family: var(--serif);
  font-size: 15px;
  font-weight: 700;
}
.quiz-nav-title .s {
  font-family: var(--mono);
  font-size: 9.5px;
  color: var(--ink-mute);
  letter-spacing: .12em;
  text-transform: uppercase;
}
.nav-actions { display: flex; align-items: center; gap: 0; justify-content: flex-end; }
.nav-actions .icon-btn { width: 40px; height: 40px; }
.nav-actions .icon-btn svg { width: 20px; height: 20px; }
#quizNav { grid-template-columns: 56px 1fr auto; padding-right: 8px; }
.quiz-timer {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  color: var(--vermilion);
  padding: 4px 8px;
  border-radius: 999px;
  background: color-mix(in srgb, var(--vermilion) 12%, transparent);
  margin-right: 4px;
  min-width: 48px;
  text-align: center;
}
.quiz-timer.warn { animation: timer-pulse 0.8s var(--ease) infinite; }
@keyframes timer-pulse { 50% { opacity: .55; } }

.mode-switch {
  display: inline-flex;
  border: 1px solid var(--paper-edge);
  border-radius: 999px;
  background: var(--paper-deep);
  padding: 3px;
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: .08em;
}
.mode-switch button {
  padding: 6px 11px;
  border-radius: 999px;
  color: var(--ink-mute);
  transition: background .2s ease, color .2s ease;
}
.mode-switch button.on {
  background: var(--ink);
  color: var(--paper);
}

/* progress bar */
.progress {
  height: 2px;
  background: var(--paper-edge);
  position: relative;
  overflow: hidden;
}
.progress-fill {
  position: absolute; inset: 0 auto 0 0;
  background: var(--vermilion);
  width: 0%;
  transition: width .3s var(--ease);
}

.pages {
  flex: 1;
  overflow-x: auto;
  overflow-y: hidden;
  scroll-snap-type: x mandatory;
  display: flex;
  flex-direction: row;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  overscroll-behavior-x: contain;
}
.pages::-webkit-scrollbar { display: none; }
.page {
  flex: 0 0 100%;
  scroll-snap-align: start;
  scroll-snap-stop: always;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 16px 20px calc(env(safe-area-inset-bottom) + 100px);
  -webkit-overflow-scrolling: touch;
}
.page::-webkit-scrollbar { width: 4px; }
.page::-webkit-scrollbar-thumb { background: var(--paper-edge); border-radius: 4px; }

.subject-pill {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .16em;
  color: var(--ink-mute);
  text-transform: uppercase;
  margin-bottom: 10px;
}
.subject-pill::before {
  content: ''; width: 18px; height: 1px; background: var(--vermilion);
}
.qnum {
  font-family: var(--serif);
  font-weight: 700;
  font-size: 56px;
  line-height: 1;
  color: var(--vermilion);
  letter-spacing: -.03em;
  font-variant-numeric: tabular-nums;
  display: flex; align-items: baseline; gap: 10px;
  margin-bottom: 14px;
}
.qnum small {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-mute);
  letter-spacing: .1em;
  font-weight: 400;
}
.qbody {
  font-family: var(--serif);
  font-size: calc(20px * var(--read-scale));
  line-height: 1.55;
  color: var(--ink);
  word-break: keep-all;
  margin-bottom: 18px;
  white-space: pre-wrap;
}
.choice .body { font-size: calc(15px * var(--read-scale)); }
.explain-detailed, .explain-basic { font-size: calc(14px * var(--read-scale)); }
.extra { font-size: calc(14px * var(--read-scale)); }
.qimg {
  margin: 6px 0 18px;
  padding: 14px;
  background: var(--paper-deep);
  border: 1px solid var(--paper-edge);
  border-radius: var(--r-md);
  text-align: center;
}
.qimg img { max-width: 100%; height: auto; }

.qmeta {
  display: flex; align-items: center;
  gap: 8px; margin-bottom: 14px;
}
.passrate {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--ink-mute);
  letter-spacing: .06em;
  padding: 4px 10px;
  background: var(--paper-chip);
  border-radius: 999px;
}
.passrate b { font-family: var(--mono); color: var(--ink); font-variant-numeric: tabular-nums; }

.choices {
  display: flex; flex-direction: column;
  gap: 8px; margin-bottom: 16px;
}
.choice {
  display: grid;
  grid-template-columns: 28px 1fr auto;
  align-items: flex-start;
  gap: 12px;
  padding: 13px 14px 13px 10px;
  background: var(--paper-deep);
  border: 1px solid var(--paper-edge);
  border-radius: var(--r-md);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.5;
  color: var(--ink);
  text-align: left;
  transition: transform .1s ease, border-color .2s ease, background .2s ease;
  word-break: keep-all;
}
.choice:active { transform: scale(.994); }
.choice .num {
  font-family: var(--serif);
  font-weight: 700;
  font-size: 17px;
  color: var(--ink-mute);
  text-align: center;
  line-height: 1.4;
  font-variant-numeric: tabular-nums;
}
.choice img { max-width: 100%; height: auto; vertical-align: middle; }
.choice.correct {
  border-color: var(--jade);
  background: color-mix(in srgb, var(--jade) 14%, var(--paper-deep));
}
.choice.correct .num { color: var(--jade); }
.choice.correct::after {
  content: '정답'; font-family: var(--mono); font-size: 10px;
  letter-spacing: .14em; color: var(--jade); align-self: center;
}
.choice.wrong {
  border-color: var(--vermilion);
  background: color-mix(in srgb, var(--vermilion) 12%, var(--paper-deep));
}
.choice.wrong .num { color: var(--vermilion); }
.choice.wrong::after {
  content: '오답'; font-family: var(--mono); font-size: 10px;
  letter-spacing: .14em; color: var(--vermilion); align-self: center;
}

/* Explanation */
.explain {
  margin-top: 16px;
  padding: 16px;
  border-radius: var(--r-md);
  background: var(--paper-deep);
  border: 1px solid var(--paper-edge);
  position: relative;
  animation: ink-bloom .4s var(--ease) both;
}
@keyframes ink-bloom {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.explain-label {
  position: absolute;
  top: -9px; left: 14px;
  background: var(--paper);
  padding: 0 10px;
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: .18em;
  color: var(--vermilion);
  text-transform: uppercase;
}
.explain-body {
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.78;
  color: var(--ink-soft);
  white-space: pre-wrap;
  word-break: keep-all;
}
.explain-body.detailed { white-space: normal; }
.explain-body h5 {
  font-family: var(--serif);
  font-weight: 700;
  font-size: 13px;
  letter-spacing: .02em;
  color: var(--vermilion);
  margin: 14px 0 4px;
  padding-bottom: 4px;
  border-bottom: 1px dotted var(--paper-edge);
}
.explain-body h5:first-child { margin-top: 0; }
.explain-body p {
  margin: 0 0 6px;
  line-height: 1.72;
}
.explain-switch {
  display: inline-flex;
  padding: 3px;
  background: var(--paper-chip);
  border-radius: 999px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .08em;
  position: absolute;
  top: -14px; right: 12px;
}
.explain-switch button {
  padding: 5px 10px;
  border-radius: 999px;
  color: var(--ink-mute);
}
.explain-switch button.on {
  background: var(--ink);
  color: var(--paper);
}
.explain-body .tag {
  display: inline-block;
  padding: 1px 8px;
  margin: 0 4px 2px 0;
  background: var(--paper-edge);
  color: var(--ink-mute);
  border-radius: 999px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .06em;
}
.explain-body img { max-width: 100%; height: auto; margin: 8px 0; }

/* ---- Extras (KaTeX / Mermaid / Markdown) ---- */
.extras { margin: 10px 0 16px; display: flex; flex-direction: column; gap: 12px; }
.extra.formula {
  padding: 14px 12px;
  background: var(--paper-deep);
  border: 1px solid var(--paper-edge);
  border-radius: var(--r-md);
  text-align: center;
  overflow-x: auto;
  font-size: 16px;
}
.extra.formula .katex { font-size: 1.15em; color: var(--ink); }
.extra.formula .katex-display { margin: 0; }
.extra.diagram {
  padding: 10px;
  background: var(--paper-deep);
  border: 1px solid var(--paper-edge);
  border-radius: var(--r-md);
  text-align: center;
  overflow-x: auto;
}
.extra.diagram svg { max-width: 100%; height: auto; }
.extra.md {
  padding: 10px 12px;
  background: var(--paper-deep);
  border: 1px solid var(--paper-edge);
  border-radius: var(--r-md);
  font-family: var(--serif);
  font-size: 15px;
  line-height: 1.6;
  color: var(--ink);
  word-break: keep-all;
}
table.md {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--sans);
  font-size: 13.5px;
  background: var(--paper-deep);
  border: 1px solid var(--paper-edge);
  border-radius: var(--r-md);
  overflow: hidden;
}
table.md th, table.md td {
  padding: 8px 10px;
  border-bottom: 1px solid var(--paper-edge);
  text-align: left;
  vertical-align: top;
  word-break: keep-all;
}
table.md th {
  background: var(--paper-chip);
  font-family: var(--serif);
  font-weight: 700;
  color: var(--ink);
  font-size: 12.5px;
  letter-spacing: -.005em;
}
table.md tr:last-child td { border-bottom: 0; }
pre.code {
  padding: 10px 12px;
  background: var(--paper-chip);
  border-radius: 8px;
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.55;
  color: var(--ink-soft);
  overflow-x: auto;
  margin: 0;
}
.choice .extras { margin: 4px 0 0; }
.choice .extra.formula,
.choice .extra.diagram,
.choice table.md { padding: 6px; font-size: 13.5px; }

/* Quiz footer */
.quiz-foot {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 8px;
  padding: 8px 14px calc(env(safe-area-inset-bottom) + 8px);
  background: var(--bar-blur);
  backdrop-filter: saturate(180%) blur(16px);
  -webkit-backdrop-filter: saturate(180%) blur(16px);
  border-top: 1px solid var(--paper-edge);
}
.foot-btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px;
  height: 40px;
  padding: 0 14px;
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: .1em;
  color: var(--ink-mute);
  text-transform: uppercase;
  border-radius: 999px;
  transition: background .15s ease, color .15s ease, transform .1s ease;
}
.foot-btn:active { color: var(--ink); background: var(--paper-chip); transform: scale(.96); }
.foot-btn.star.on { color: var(--seal); }
.foot-btn svg { width: 16px; height: 16px; }
.jump {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  height: 40px;
  padding: 0 18px;
  background: var(--paper-chip);
  border-radius: 999px;
  font-family: var(--serif);
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
  transition: transform .1s ease;
}
.jump:active { transform: scale(.97); }
.jump .slash { color: var(--ink-mute); font-weight: 400; }

/* ===================================================================
   Bottom sheet
   =================================================================== */
.sheet-backdrop {
  position: fixed; inset: 0;
  background: rgba(26,20,16,.4);
  z-index: 50;
  opacity: 0;
  animation: fade-in .2s ease forwards;
}
.sheet-backdrop.closing { animation: fade-out .2s ease forwards; }
@keyframes fade-out { to { opacity: 0; } }
.sheet {
  position: fixed; left: 0; right: 0; bottom: 0;
  z-index: 51;
  background: var(--paper);
  border-top-left-radius: 22px;
  border-top-right-radius: 22px;
  box-shadow: var(--shadow-lift);
  padding: 8px 16px calc(env(safe-area-inset-bottom) + 16px);
  max-height: 88vh;
  overflow: auto;
  animation: sheet-in .34s var(--spring) both;
  display: flex; flex-direction: column;
}
.sheet.closing { animation: sheet-out .24s var(--ease) both; }
.sheet-handle {
  width: 44px; height: 4px;
  background: var(--paper-edge);
  border-radius: 4px;
  margin: 8px auto 14px;
}
.sheet h2 {
  font-family: var(--serif);
  font-weight: 700;
  font-size: 19px;
  margin: 0 4px 14px;
}

/* number pad grid for jump sheet */
.numpad {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  max-height: 60vh;
  overflow-y: auto;
  padding: 4px 0 8px;
}
.numpad button {
  height: 52px;
  background: var(--paper-deep);
  border: 1px solid var(--paper-edge);
  border-radius: var(--r-md);
  font-family: var(--serif);
  font-size: 17px;
  font-weight: 700;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
  transition: transform .1s, background .15s;
  position: relative;
}
.numpad button:active { transform: scale(.94); background: var(--paper-chip); }
.numpad button.done { color: var(--jade); }
.numpad button.wrong::after {
  content: ''; position: absolute; right: 6px; top: 6px;
  width: 5px; height: 5px; border-radius: 50%; background: var(--vermilion);
}
.numpad button.starred::before {
  content: '★'; position: absolute; left: 6px; top: 4px;
  font-size: 10px; color: var(--seal);
}

/* Settings list in sheet */
.sheet-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 12px;
  border-bottom: 1px solid var(--paper-edge);
}
.sheet-row[hidden] { display: none; }
.sheet-row:last-child { border-bottom: 0; }
.sheet-row .l { font-family: var(--serif); font-size: 15px; font-weight: 700; }
.sheet-row .r { font-family: var(--mono); font-size: 11px; color: var(--ink-mute); letter-spacing: .06em; }
.sheet-row button.r { padding: 6px 12px; background: var(--paper-chip); border-radius: 999px; }
.seg {
  display: inline-flex; padding: 3px; gap: 0;
  background: var(--paper-chip); border-radius: 999px;
}
.seg button {
  padding: 6px 12px; border-radius: 999px;
  font-family: var(--mono); font-size: 11px;
  color: var(--ink-mute);
}
.seg button.on { background: var(--ink); color: var(--paper); }

/* Import sheet */
.import-preview {
  padding: 8px 4px 16px;
  font-family: var(--sans);
  font-size: 14px;
}
.import-preview .ip-row {
  display: flex; justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--paper-edge);
}
.import-preview .ip-row span { color: var(--ink-mute); }
.import-preview .ip-row b {
  font-family: var(--mono); font-size: 13px;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
}
.import-preview .ip-hint {
  margin: 14px 0 4px;
  padding: 12px 14px;
  background: var(--paper-chip);
  border-radius: 10px;
  font-size: 12.5px;
  line-height: 1.7;
  color: var(--ink-soft);
}
.ip-foot {
  margin: 10px 4px 4px;
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: .02em;
  color: var(--ink-mute);
  text-align: center;
}
.sheet-action-row {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; margin: 12px 0 4px;
}
.big-action {
  padding: 14px 16px;
  border-radius: 14px;
  font-family: var(--serif);
  font-weight: 700;
  font-size: 16px;
  letter-spacing: -.01em;
  transition: transform .1s, background .15s;
}
.big-action:active { transform: scale(.98); }
.big-action.merge   { background: var(--ink);       color: var(--paper); }
.big-action.replace { background: var(--paper-chip); color: var(--vermilion); border: 1px solid var(--vermilion); }

/* ===================================================================
   Loading skeletons
   =================================================================== */
.skeleton {
  background: linear-gradient(90deg, var(--paper-deep) 0%, var(--paper-chip) 50%, var(--paper-deep) 100%);
  background-size: 200% 100%;
  animation: shimmer 1.3s linear infinite;
  border-radius: var(--r-md);
  height: 56px;
  margin: 8px 16px;
}
@keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

/* Toast */
.toast {
  position: fixed;
  bottom: calc(env(safe-area-inset-bottom) + 96px);
  left: 50%; transform: translateX(-50%);
  padding: 10px 16px;
  background: var(--ink); color: var(--paper);
  font-family: var(--mono); font-size: 11px;
  letter-spacing: .08em;
  border-radius: 999px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s ease;
  z-index: 80;
}
.toast.show { opacity: 1; }

.toast-action {
  position: fixed;
  bottom: calc(env(safe-area-inset-bottom) + 96px);
  left: 50%; transform: translate(-50%, 12px);
  padding: 10px 8px 10px 18px;
  background: var(--ink); color: var(--paper);
  font-family: var(--sans); font-size: 14px;
  border-radius: 999px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: var(--shadow-lift);
  opacity: 0;
  transition: opacity .25s ease, transform .25s var(--spring);
  z-index: 90;
  max-width: calc(100vw - 32px);
}
.toast-action.show { opacity: 1; transform: translate(-50%, 0); }
.toast-action button {
  background: var(--vermilion); color: var(--paper);
  border-radius: 999px;
  padding: 6px 14px;
  font-weight: 600;
}

/* Completion card */
.complete {
  margin: 24px 16px;
  padding: 28px;
  background: var(--paper-deep);
  border: 1px solid var(--paper-edge);
  border-radius: var(--r-xl);
  text-align: center;
  animation: scale-in .34s var(--spring) both;
}
.complete .mark { font-family: var(--serif); font-size: 48px; color: var(--vermilion); line-height: 1; }
.complete h2 { font-family: var(--serif); margin: 12px 0 6px; font-size: 24px; }
.complete .score { font-family: var(--mono); font-size: 40px; font-weight: 700; color: var(--ink); }
.complete .rate  { font-family: var(--mono); font-size: 11px; color: var(--ink-mute); letter-spacing: .14em; margin-top: 6px; }

/* Completion sheet */
.completion { padding: 8px 4px 24px; text-align: center; }
.completion .comp-pct { font-family: var(--serif); font-size: 64px; font-weight: 700; color: var(--vermilion); line-height: 1; }
.completion .comp-pct small { font-size: 28px; opacity: .7; margin-left: 4px; }
.completion .comp-line { font-family: var(--sans); color: var(--ink-soft); margin: 8px 0 20px; }
.completion .r-primary {
  display: block; width: 100%;
  padding: 14px;
  background: var(--vermilion); color: var(--paper);
  border-radius: var(--r-md);
  font-weight: 600;
  margin-bottom: 12px;
}
.completion .comp-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.completion .r-soft {
  padding: 12px 8px;
  background: var(--paper-deep);
  border: 1px solid var(--paper-edge);
  border-radius: var(--r-md);
  color: var(--ink);
  font-size: 13px;
}

/* Ad slots */
.ad-slot { text-align: center; padding: 8px 0; min-height: 50px; }
.ad-slot-banner { margin: 8px 16px; background: var(--paper-deep); border: 1px dashed var(--paper-edge); border-radius: var(--r-sm); display: flex; align-items: center; justify-content: center; color: var(--ink-faint); font-size: 11px; font-family: var(--mono); letter-spacing: .08em; min-height: 90px; }
.ad-slot-interstitial { position: fixed; inset: 0; z-index: 100; background: var(--paper); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
.ad-slot-interstitial .ad-label { color: var(--ink-faint); font-family: var(--mono); font-size: 11px; letter-spacing: .08em; }
.ad-slot-interstitial .ad-container { width: 320px; min-height: 250px; background: var(--paper-deep); border: 1px dashed var(--paper-edge); border-radius: var(--r-md); display: flex; align-items: center; justify-content: center; color: var(--ink-faint); font-size: 12px; }
.ad-slot-interstitial .ad-close { margin-top: 12px; font-family: var(--sans); font-size: 14px; color: var(--vermilion); background: none; border: none; cursor: pointer; }

/* Wider screens */
@media (min-width: 720px) {
  .page, .large-title, .section-head, .stat-row, .group { max-width: 720px; margin-left: auto; margin-right: auto; }
  /* Constrain the horizontal scroll-snap container so the next card never peeks past the active one */
  .pages { max-width: 720px; margin-left: auto; margin-right: auto; }
}
</style>

async function loadSession(examCode, sessionCode){

/* ---- content renderers (extras) ---- */
let _renderersReady = false;
async function ensureRenderers(){
  if (_renderersReady) return;
  _renderersReady = true;
  // Lazy-load KaTeX script + auto-render
  if (!window.katex) {
    await import('https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.mjs').then(m => { window.katex = m.default || m; }).catch(()=>{});
  }
  if (!window.mermaid) {
    try {
      const m = await import('https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs');
      window.mermaid = m.default || m;
      window.mermaid.initialize({ startOnLoad: false,
        theme: (document.documentElement.getAttribute('data-theme')==='dark' || matchMedia('(prefers-color-scheme:dark)').matches) ? 'dark' : 'default',
        securityLevel: 'loose',
        fontFamily: "'Pretendard Variable', 'Noto Sans KR', sans-serif",
      });
    } catch {}
  }
}

function renderExtra(extra){
  // returns HTML string
  const kind = extra.kind || 'text';
  const raw = extra.content || '';
  if (kind === 'formula') return renderFormula(raw);
  if (kind === 'diagram') return renderDiagram(raw);
  if (kind === 'table')   return renderMarkdown(raw);
  return renderMarkdown(raw); // text / mixed
}

function renderFormula(s){
  // Replace each $$...$$ block with katex output
  return `<div class="extra formula">${s.replace(/\$\$([\s\S]+?)\$\$/g, (_, tex) => {
    try { return window.katex ? window.katex.renderToString(tex.trim(), { throwOnError: false, displayMode: true }) : `<code>${escapeHtml(tex)}</code>`; }
    catch { return `<code>${escapeHtml(tex)}</code>`; }
  })}</div>`;
}

function renderDiagram(s){
  const m = s.match(/```mermaid\s*([\s\S]+?)```/);
  if (!m) return `<pre class="extra">${escapeHtml(s)}</pre>`;
  const code = m[1].trim();
  const id = 'mmd_' + Math.random().toString(36).slice(2, 10);
  // Return a placeholder; actual render happens after mount via renderPendingMermaid
  return `<div class="extra diagram"><div class="mmd" data-id="${id}" data-src="${encodeURIComponent(code)}"></div></div>`;
}

function renderMarkdown(s){
  // Minimal markdown: tables, code blocks, preserve newlines + KaTeX $$
  let html = s;
  // code blocks
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
    `<pre class="code"><code>${escapeHtml(code)}</code></pre>`);
  // tables
  html = html.replace(/(^\|.+\|\n\|[\s\-:|]+\|\n(?:\|.+\|\n?)+)/gm, (block) => {
    const rows = block.trim().split('\n').map(r =>
      r.replace(/^\||\|$/g, '').split('|').map(c => c.trim())
    );
    const header = rows[0];
    const body = rows.slice(2);
    return `<table class="md"><thead><tr>${header.map(c => `<th>${escapeHtml(c)}</th>`).join('')}</tr></thead>` +
           `<tbody>${body.map(r => `<tr>${r.map(c => `<td>${escapeHtml(c)}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
  });
  // KaTeX inline $$...$$ within text
  html = html.replace(/\$\$([^\$]+)\$\$/g, (_, tex) => {
    try { return window.katex ? window.katex.renderToString(tex.trim(), { throwOnError: false, displayMode: true }) : `<code>${escapeHtml(tex)}</code>`; }
    catch { return `<code>${escapeHtml(tex)}</code>`; }
  });
  // plain-ish lines that aren't in a table/code already: wrap in div with line breaks
  if (!html.startsWith('<table') && !html.startsWith('<pre')) {
    html = `<div class="extra md">${html.split('\n').map(l => l ? escapeHtml(l).replace(/&lt;br\s*\/?&gt;/g,'<br>') : '').join('<br>')}</div>`;
  }
  return html;
}

async function renderPendingMermaid(scope){
  if (!scope) return;
  const nodes = scope.querySelectorAll('.mmd[data-src]');
  if (!nodes.length) return;
  await ensureRenderers();
  if (!window.mermaid) return;
  for (const n of nodes) {
    const code = decodeURIComponent(n.dataset.src);
    const id = n.dataset.id;
    try {
      const { svg } = await window.mermaid.render(id, code);
      n.innerHTML = svg;
    } catch (e) {
      n.innerHTML = `<pre class="code"><code>${escapeHtml(code)}</code></pre>`;
    }
    n.removeAttribute('data-src');
  }
}

function fillSessionList(root, examCode, sessions){
  let answered = 0, done = 0;
  for (const s of sessions){
    const p = progressFor(examCode, s.code);
    const a = Object.keys(p.answers||{}).length;
    answered += a;
    if (s.count && a === s.count) done++;
  }
  const stats = root.querySelectorAll('.stat .n');
  stats[0].textContent = sessions.length;
  stats[1].textContent = answered.toLocaleString();
  stats[2].textContent = done;

  const years = {};
  for (const s of sessions) (years[s.year] = years[s.year] || []).push(s);
  const yrs = Object.keys(years).sort((a,b)=>b-a);
  // compute ordinal within same year (1회, 2회, ...) based on chronological order
  const monthNames = ['', '1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  root.querySelector('#yearList').innerHTML = yrs.map(y => {
    const ys = years[y].slice().sort((a,b) => a.date.localeCompare(b.date));
    const ord = new Map(ys.map((s,i) => [s.code, ys.length > 1 ? `${i+1}회차` : '정기']));
    return `
    <div class="section-head"><h2>${y}년</h2><span class="meta">${years[y].length} EX</span></div>
    <div class="group">${years[y].map(s => {
      const p = progressFor(examCode, s.code);
      const a = Object.keys(p.answers||{}).length;
      const st = s.count && a===s.count ? 'done' : a>0 ? 'active' : '';
      const mn = monthNames[parseInt(s.date.slice(5,7), 10)];
      const day = parseInt(s.date.slice(8,10), 10);
      return `<button class="row" data-code="${s.code}" ${s.count?'':'disabled'}>
        <span class="row-lead">${s.date.slice(5,7)}.${s.date.slice(8,10)}</span>
        <span class="row-body">
          <span class="row-title">${mn} ${day}일</span>
          <span class="row-sub">${ord.get(s.code)} · ${s.count? s.count+'문항':'수집 전'}</span>
        </span>
        <span class="row-trail">
          ${s.count ? `<span class="pill ${st}">${a}/${s.count}</span>` : '<span class="pill">—</span>'}
          ${icons.chev}
        </span>
      </button>`;
    }).join('')}</div>`;
  }).join('');
  root.querySelectorAll('.row[data-code]').forEach(el => {
    el.addEventListener('click', () => openQuiz(examCode, el.dataset.code));
  });
}

      sort = b.dataset.s;
      root.querySelectorAll('#wrongsSort button').forEach(x => x.classList.toggle('on', x.dataset.s === sort));
      re();
    });
  } catch {}
}

function collectAcross(kind){
  const groups = [];
  for (const e of state.exams) {
    const sessions = state.sessionsCache.get(e.code) || [];
    for (const s of sessions) {
      const p = progressFor(e.code, s.code);
      const list = kind === 'stars' ? (p.stars||[]) : (p.wrongs||[]);
      if (!list.length) continue;
      groups.push({
        examCode: e.code, examName: e.name,
        code: s.code, date: s.date,
        nums: list.slice().sort((a,b)=>a-b),
        seenAt: p.seenAt || {},
      });
    }
  }
  // sort: newest first (by session code desc)
  return groups.sort((a,b) => (a.examCode + a.code) < (b.examCode + b.code) ? 1 : -1);
}

function renderCollected($root, groups, kindLabel, opts = {}){
  const showDue = opts.showDue;
  $root.innerHTML = groups.map(g => `
    <div class="section-head">
      <h2>${escapeHtml(g.examName)} · ${g.date}</h2>
      <span class="meta">${g.nums.length} ${kindLabel}</span>
    </div>
    <div class="group">
      ${g.nums.map(n => {
        const ts = g.seenAt?.[n];
        const due = showDue ? dueLabel(ts) : '탭하여 바로 이동';
        return `<button class="row" data-exam="${g.examCode}" data-code="${g.code}" data-num="${n}">
          <span class="row-lead">${String(n).padStart(3,'0')}</span>
          <span class="row-body">
            <span class="row-title">${g.date.slice(2).replace(/-/g,'.')} · ${n}번</span>
            <span class="row-sub">${escapeHtml(due)}</span>
          </span>
          <span class="row-trail">${icons.chev}</span>
        </button>`;
      }).join('')}
    </div>
  `).join('');
  $root.querySelectorAll('.row[data-exam]').forEach(el => {
    el.addEventListener('click', () => openQuiz(el.dataset.exam, el.dataset.code, +el.dataset.num - 1));
  });
}

function dueLabel(ts){
  if (!ts) return '복습할 시간';
  const days = (Date.now() - ts) / 86400000;
  if (days < 1) return '오늘 풀이';
  if (days < 2) return '어제 풀이';
  if (days < 7) return `${Math.floor(days)}일 전`;
  if (days < 30) return `${Math.floor(days/7)}주 전 — 복습 추천`;
  return `${Math.floor(days/30)}개월 전 — 다시 복습`;
}

function bindSearch(input, onChange){
  if (!input) return;
  let t;
  input.addEventListener('input', () => {
    clearTimeout(t);
    t = setTimeout(() => onChange(input.value.trim().toLowerCase()), 180);
  });
}

function filterGroupsByQuery(groups, query){
  if (!query) return groups;
  // Lazy-search through cached session data only — no extra fetches for speed
  const out = [];
  for (const g of groups) {
    const data = state.dataCache.get(`${g.examCode}:${g.code}`);
    if (!data) {
      // Not loaded — keep group but don't filter (acceptable trade-off)
      out.push(g); continue;
    }
    const matchedNums = g.nums.filter(n => {
      const q = data.questions.find(qq => qq.number === n);
      if (!q) return false;
      const text = ((q.question || '') + ' ' + (q.subject || '') +
                    ' ' + (q.choices||[]).map(c => c.text || '').join(' ')).toLowerCase();
      return text.includes(query);
    });
    if (matchedNums.length) out.push({ ...g, nums: matchedNums });
  }
  return out;
}

function sortByForgettingCurve(groups){
  // Flatten, sort by oldest seenAt, regroup
  const items = [];
  for (const g of groups) {
    for (const n of g.nums) {
      items.push({ ...g, n, ts: g.seenAt?.[n] || 0 });
    }
  }
  items.sort((a, b) => a.ts - b.ts);
  const merged = new Map();
  for (const it of items) {
    const key = `${it.examCode}:${it.code}`;
    if (!merged.has(key)) merged.set(key, { ...it, nums: [it.n] });
    else merged.get(key).nums.push(it.n);
  }
  return [...merged.values()].map(g => ({
    examCode: g.examCode, examName: g.examName, code: g.code, date: g.date,
    nums: g.nums, seenAt: g.seenAt,
  }));
}

/* ===================================================================
   Export / Import helpers
   =================================================================== */
function buildDump(){
  const dump = { _meta: { version: 'v2', exportedAt: Date.now() } };
  for (let i = 0; i < localStorage.length; i++){
    const k = localStorage.key(i);
    if (!k.startsWith(STORE)) continue;
    if (k === STORE + '_backup') continue;   // don't export the backup slot
    dump[k.slice(STORE.length)] = safeParse(localStorage.getItem(k));
  }
  return dump;
}

function safeParse(s){
  try { return JSON.parse(s); } catch { return s; }
}

function computeStats(){
  let sessions = 0, answers = 0, stars = 0, wrongs = 0;
  for (let i = 0; i < localStorage.length; i++){
    const k = localStorage.key(i);
    if (!k.startsWith(STORE + 'progress:')) continue;
    sessions++;
    try {
      const v = JSON.parse(localStorage.getItem(k));
      answers += Object.keys(v.answers || {}).length;
      stars += (v.stars || []).length;
      wrongs += (v.wrongs || []).length;
    } catch {}
  }
  return { sessions, answers, stars, wrongs };
}

function computeStatsFromDump(d){
  let sessions = 0, answers = 0, stars = 0, wrongs = 0;
  for (const k of Object.keys(d)){
    if (!k.startsWith('progress:')) continue;
    sessions++;
    const v = d[k] || {};
    answers += Object.keys(v.answers || {}).length;
    stars += (v.stars || []).length;
    wrongs += (v.wrongs || []).length;
  }
  return { sessions, answers, stars, wrongs };
}

function backupCurrent(){
  const snap = buildDump();
  snap._at = Date.now();
  store.set('_backup', snap);
}

/* ---- learning stats (per-exam, per-subject) ---- */
function computeLearnStats(){
  const perExam = {};   // code → { answered, correct, wrong, sessions:Set }
  const perSubject = {}; // examCode → subject → { answered, correct }
  let totalAnswered = 0, totalCorrect = 0;
  for (let i = 0; i < localStorage.length; i++){
    const k = localStorage.key(i);
    if (!k.startsWith(STORE + 'progress:')) continue;
    const m = k.slice(STORE.length).match(/^progress:([^:]+):(.+)$/);
    if (!m) continue;
    const [, examCode, sessionCode] = m;
    let v; try { v = JSON.parse(localStorage.getItem(k)); } catch { continue; }
    perExam[examCode] = perExam[examCode] || { answered: 0, correct: 0, wrong: 0, sessionCodes: new Set() };
    const ans = v.answers || {};
    const wrongSet = new Set(v.wrongs || []);
    for (const qNum of Object.keys(ans)) {
      perExam[examCode].answered++;
      const wrong = wrongSet.has(+qNum) || wrongSet.has(qNum);
      if (wrong) perExam[examCode].wrong++; else perExam[examCode].correct++;
      totalAnswered++;
      if (!wrong) totalCorrect++;
    }
    perExam[examCode].sessionCodes.add(sessionCode);
    // subject breakdown — needs the loaded session data; skip if not cached
    const dataKey = `${examCode}:${sessionCode}`;
    const data = state.dataCache.get(dataKey);
    if (data) {
      perSubject[examCode] = perSubject[examCode] || {};
      for (const q of data.questions) {
        const a = ans[q.number];
        if (a == null) continue;
        const subj = (q.subject || '기타').replace(/^\d+과목\s*:\s*/, '').trim() || '기타';
        const s = perSubject[examCode][subj] = perSubject[examCode][subj] || { answered: 0, correct: 0 };
        s.answered++;
        if (a === q.answer) s.correct++;
      }
    }
  }
  const accuracy = totalAnswered ? Math.round(totalCorrect * 100 / totalAnswered) : 0;
  return { perExam, perSubject, totalAnswered, totalCorrect, accuracy };
}

        <span class="row-sub">${x.sessionCodes.size}회차 · ${x.answered}문항 · 정답률 ${acc}%</span></span>

    </div>`;
  }).join('') || '<div class="empty">아직 풀이한 문항이 없어요</div>';

  const subjectRows = Object.entries(st.perSubject).flatMap(([examCode, subs]) =>
    Object.entries(subs).map(([subj, s]) => {
      const acc = s.answered ? Math.round(s.correct * 100 / s.answered) : 0;
      return `<div class="row">
        <span class="row-lead">${({s2:'사조',g1:'공1',g2:'공2',iz:'정처'})[examCode] || ''}</span>
        <span class="row-body"><span class="row-title" style="font-size:14px">${escapeHtml(subj)}</span>
          <span class="row-sub">${s.answered}문항 · 정답 ${s.correct}</span></span>
        <span class="row-trail"><span class="pill ${acc>=70?'active':acc<50?'warn':''}">${acc}%</span></span>
      </div>`;
    })
  ).sort((a,b) => {
    const m = (s) => +(s.match(/(\d+)%<\/span/)?.[1] || 100);
    return m(a) - m(b);
  }).join('');

  screen.innerHTML = `
    <header class="nav has-title" id="statsNav">
      <button class="icon-btn" id="statsBack" aria-label="뒤로">${icons.back}</button>
      <div class="nav-title">학습 현황</div>
      <div></div>
    </header>
    <div class="scroll" id="statsScroll">
      <div class="large-title">
        <div class="kicker">PERFORMANCE</div>
        <h1>${st.accuracy}<small style="font-size:36px;opacity:.7">%</small></h1>
        <div class="row-sub" style="text-align:center;margin-top:-12px">총 ${st.totalAnswered}문항 · 정답 ${st.totalCorrect}</div>
      </div>
      <div class="section-head"><h2>자격증별</h2></div>
      <div class="group">${examRows}</div>
      ${subjectRows ? `<div class="section-head"><h2>약점 과목 (정답률 낮은 순)</h2></div><div class="group">${subjectRows}</div>` : ''}
    </div>
  `;
  stack.appendChild(screen);
  updateScreenInert();
  attachScrollShadow('statsScroll', 'statsNav');
  screen.querySelector('#statsBack').onclick = popScreen;
  addEdgeBack(screen);
  history.pushState({ type:'stats', depth: (history.state?.depth || 0)+1 }, '', '/stats');
}

function applyDump(dump, { mode }){
  // Returns stats of what changed.
  if (mode === 'replace'){
    backupCurrent();
    Object.keys(localStorage).filter(k => k.startsWith(STORE) && k !== STORE + '_backup').forEach(k => localStorage.removeItem(k));
    for (const [k, v] of Object.entries(dump)){
      if (k.startsWith('_')) continue;
      localStorage.setItem(STORE + k, typeof v === 'string' ? v : JSON.stringify(v));
    }
    return;
  }
  // merge mode: per-key union
  backupCurrent();
  for (const [k, v] of Object.entries(dump)){
    if (k.startsWith('_')) continue;
    const storeKey = STORE + k;
    const raw = localStorage.getItem(storeKey);
    if (!raw){
      localStorage.setItem(storeKey, typeof v === 'string' ? v : JSON.stringify(v));
      continue;
    }
    if (k.startsWith('progress:')){
      const local = safeParse(raw) || {};
      const incoming = v || {};
      const localN = Object.keys(local.answers || {}).length;
      const incomingN = Object.keys(incoming.answers || {}).length;
      // For answer conflicts, prefer the side with more total progress (assumed newer session).
      // Start with less-progressed side, overwrite with more-progressed.
      const answers = incomingN >= localN
        ? Object.assign({}, local.answers || {}, incoming.answers || {})
        : Object.assign({}, incoming.answers || {}, local.answers || {});
      const merged = {
        answers,
        stars:  [...new Set([...(local.stars ||[]), ...(incoming.stars ||[])])].sort((a,b)=>a-b),
        wrongs: [...new Set([...(local.wrongs||[]), ...(incoming.wrongs||[])])].sort((a,b)=>a-b),
        mode: incomingN > localN ? (incoming.mode || local.mode || 'practice') : (local.mode || 'practice'),
        last: Math.max(local.last || 0, incoming.last || 0),
      };
      localStorage.setItem(storeKey, JSON.stringify(merged));
    } else {
      // theme / expPref — keep local (user's current device preference)
    }
  }
}

      ensureRenderers().then(() => renderPendingMermaid($pages));
    });

          state.current.idx = i;
          const pr = progressFor(examCode, sessionCode); pr.last = i;

function updateScreenInert(){
  const screens = document.querySelectorAll('#stack > .screen');
  const top = screens[screens.length - 1];
  screens.forEach(s => {
    if (s === top) {
      s.removeAttribute('inert');
      s.removeAttribute('aria-hidden');
    } else {
      s.setAttribute('inert', '');
      s.setAttribute('aria-hidden', 'true');
    }
  });
}

function popScreen(){
  // User-initiated back (button/edge swipe/Esc): drive via history so URL stays in sync.
  // popstate handler will then call doPopScreen.
  if ((history.state?.depth || 0) > 0) {
    history.back();
  } else {
    doPopScreen();
  }
}

function doPopScreen(){
  stopExamTimer();
  const stack = document.getElementById('stack');
  const last = stack.lastElementChild;
  if (stack.children.length <= 1) return;
  last.classList.remove('enter-right');
  last.classList.add('exit-right');
  last.addEventListener('animationend', () => {
    last.remove();
    updateScreenInert();
    const top = stack.lastElementChild;
    if (top) {
      if (top.dataset.tab) {
        showTab(top.dataset.tab);
      } else if (state.currentExam) {
        loadSessions(state.currentExam).then(s => fillSessionList(top, state.currentExam, s)).catch(()=>{});
      }
    }
  }, { once: true });
  document.getElementById('shell').classList.remove('hide-tabs');
  document.removeEventListener('keydown', onKey);
  state.current = null;
  if (stack.children.length <= 1) showInterstitialAd();
}

/* Ad management */
let _adCooldown = 0;
function showInterstitialAd(){
  if (!ADSENSE.client || !ADSENSE.slots.interstitial) return;
  const now = Date.now();
  if (now - _adCooldown < 120000) return;
  _adCooldown = now;
  const el = document.createElement('div');

    <div class="ad-container">${adInsHTML(ADSENSE.slots.interstitial, { format:'rectangle', fullWidth:false })}</div>
    <button class="ad-close">닫기</button>`;

function renderExtras(arr){
  if (!arr || !arr.length) return '';
  return `<div class="extras">${arr.map(e => renderExtra(e)).join('')}</div>`;
}
function renderImagesFallback(arr, label){
  if (!arr || !arr.length) return '';
  const lbl = label || '문항 이미지';
  return arr.map((src, i) => `<div class="qimg"><img src="${src}" loading="lazy" alt="${escapeHtml(lbl)} ${i+1}"></div>`).join('');
}

function renderQuestionHTML(q, i, total){
  const subj = escapeHtml(q.subject || '');
  const qExtras = renderExtras(q.question_extras) || renderImagesFallback(q.question_images, `문제 ${q.number} 이미지`);
  const choicesHtml = (q.choices || []).map((c, ci) => {
    const num = ['①','②','③','④'][ci] || (ci+1);
    const extras = renderExtras(c.extras) ||
                   (c.images || []).map((s, ii) => `<img src="${s}" loading="lazy" alt="보기 ${num} 이미지${(c.images.length>1)?' '+(ii+1):''}">`).join('');
    return `
      <button class="choice" data-qi="${i}" data-ci="${ci+1}">
        <span class="num">${num}</span>
        <span class="body">${escapeHtml(c.text||'')}${extras}</span>
      </button>`;
  }).join('');
  const rate = (q.pass_rate!=null) ? `<span class="passrate">정답률 <b>${q.pass_rate}%</b></span>` : '';
  return `
    <article class="page" data-qi="${i}">
      <div class="subject-pill">${subj}</div>
      <div class="qnum">${q.number}<small>· ${i+1}/${total}</small></div>
      <div class="qbody">${escapeHtml(q.question)}</div>
      ${qExtras}
      <div class="qmeta">${rate}</div>
      <div class="choices">${choicesHtml}</div>
      <div class="explain-slot"></div>
    </article>`;
}

function applyAnswers(){
  const c = state.current; if (!c) return;
  const p = progressFor(c.examCode, c.code);
  const review = c.mode === 'review';
  c.screen.querySelectorAll('.page').forEach(page => {
    const qi = +page.dataset.qi;
    const q = c.data.questions[qi];
    const picked = p.answers[q.number];
    if (review) { markChoices(page, q, q.answer); renderExplain(page, q, true); }
    else if (picked) { markChoices(page, q, picked); renderExplain(page, q, false); }
    else {
      page.querySelectorAll('.choice').forEach(b => b.classList.remove('picked','correct','wrong'));
      page.querySelector('.explain-slot').innerHTML = '';
    }
  });
  updatePositionIndicators();
}

function markChoices(page, q, picked){
  page.querySelectorAll('.choice').forEach(b => {
    const ci = +b.dataset.ci;
    b.classList.remove('picked','correct','wrong');
    if (ci === q.answer) b.classList.add('correct');
    else if (ci === picked && picked !== q.answer) b.classList.add('wrong');
  });
}

function cleanExplanation(s){
  if (!s) return '';
  s = s.replace(/^[>\s]+/, '');
  s = s.replace(/\n{3,}/g, '\n\n');
  return s.trim();
}
function formatDetailed(raw){
  if (!raw) return '';
  // Turn section headings into bold separators
  const lines = raw.split(/\r?\n/);
  const out = [];
  for (const ln of lines) {
    const t = ln.trim();
    if (/^(핵심 개념|정답 분석|오답 분석|참고)$/.test(t)) {
      out.push(`<h5>${t}</h5>`);
    } else if (t) {
      // bullets starting with ①②③④- •
      out.push(`<p>${escapeHtml(t)}</p>`);
    } else {
      out.push('');
    }
  }
  return out.join('\n');
}

function renderExplain(page, q, force){
  const slot = page.querySelector('.explain-slot');
  const hasDetailed = !!q.explanation_detailed;
  const hasExtras = !!(q.explanation_extras && q.explanation_extras.length);
  const hasBasic = !!(q.explanation || hasExtras || (q.explanation_images||[]).length);
  if (!force && !hasDetailed && !hasBasic) { slot.innerHTML=''; return; }
  const imgs = hasExtras ? renderExtras(q.explanation_extras)
               : (q.explanation_images || []).map((s, i) => `<img src="${s}" loading="lazy" alt="해설 이미지 ${i+1}">`).join('');
  const cleaned = cleanExplanation(q.explanation);
  const basicText = escapeHtml(cleaned || '').trim();
  const detailedHtml = formatDetailed(q.explanation_detailed || '');

  // default: show detailed if available, toggle to basic
  const pref = store.get('expPref') || (hasDetailed ? 'detailed' : 'basic');
  const cur = pref === 'detailed' && !hasDetailed ? 'basic' :
              pref === 'basic'    && !basicText   ? 'detailed' : pref;

  const toggle = hasDetailed && basicText ? `
    <div class="explain-switch">
      <button data-exp="detailed" class="${cur==='detailed'?'on':''}">상세 해설</button>
      <button data-exp="basic" class="${cur==='basic'?'on':''}">간단 해설</button>
    </div>` : '';

  const body = cur === 'detailed' && hasDetailed
    ? `<div class="explain-body detailed">${detailedHtml}${imgs}</div>`
    : `<div class="explain-body">${basicText || '(해설 없음)'}${imgs}</div>`;

  slot.innerHTML = `<section class="explain">
    <span class="explain-label">${cur==='detailed' ? '상세 해설' : '문제 해설'}</span>
    ${toggle}
    ${body}
  </section>`;

  const sw = slot.querySelector('.explain-switch');
  if (sw) sw.addEventListener('click', e => {
    const b = e.target.closest('button'); if (!b) return;
    store.set('expPref', b.dataset.exp);
    renderExplain(page, q, force);
  });
}

function onChoiceClick(e){
  const b = e.target.closest('.choice'); if (!b) return;
  const c = state.current;
  if (c.mode === 'review') return;
  const qi = +b.dataset.qi;
  const ci = +b.dataset.ci;
  const q = c.data.questions[qi];
  const p = progressFor(c.examCode, c.code);
  if (p.answers[q.number]) return;
  p.answers[q.number] = ci;
  p.last = qi;
  p.wrongs = p.wrongs || [];
  p.seenAt = p.seenAt || {};
  p.seenAt[q.number] = Date.now();
  if (ci !== q.answer && !p.wrongs.includes(q.number)) p.wrongs.push(q.number);
  saveProgress(c.examCode, c.code, p);
  const page = b.closest('.page');
  markChoices(page, q, ci);
  renderExplain(page, q, false);
  updatePositionIndicators();
  haptic(ci === q.answer ? 'correct' : 'wrong');
  toast(ci === q.answer ? '정답' : `오답 · 정답 ${q.answer}`);
  maybeShowCompletion(c, p);
}

function toggleStar(){
  const c = state.current; if (!c) return;
  const p = progressFor(c.examCode, c.code);
  const q = c.data.questions[c.idx];
  p.stars = p.stars || [];
  const i = p.stars.indexOf(q.number);
  const btn = c.screen.querySelector('#starBtn');
  if (i>=0) { p.stars.splice(i,1); btn.classList.remove('on'); btn.querySelector('svg').outerHTML = icons.star; toast('북마크 해제'); }
  else { p.stars.push(q.number); btn.classList.add('on'); btn.querySelector('svg').outerHTML = icons.starFill; toast('북마크'); }
  saveProgress(c.examCode, c.code, p);
}

function confirmRedo(){
  const c = state.current; if (!c) return;
  const p = progressFor(c.examCode, c.code);
  if (Object.keys(p.answers || {}).length === 0 && (p.wrongs || []).length === 0) {
    toast('이미 비어있어요'); return;
  }
  const snap = JSON.parse(JSON.stringify(p));
  p.answers = {}; p.wrongs = []; p.last = 0;
  saveProgress(c.examCode, c.code, p);
  applyAnswers();
  c.screen.querySelector('#pages').scrollTo({ left: 0, behavior: 'smooth' });
  toastAction('초기화됨', '되돌리기', () => {
    saveProgress(c.examCode, c.code, snap);
    applyAnswers();
    toast('복원됨');
  });
  setTimeout(() => document.getElementById('toast-action')?.remove(), 6000);
}

function updatePositionIndicators(){
  const c = state.current; if (!c) return;
  const p = progressFor(c.examCode, c.code);
  const i = c.idx;
  const q = c.data.questions[i];
  const total = c.data.questions.length;
  c.screen.querySelector('#jumpNum').textContent = i+1;
  c.screen.querySelector('#quizSub').textContent = q.subject || '';
  c.screen.querySelector('#pFill').style.width = ((i+1)/total*100).toFixed(1) + '%';
  const starBtn = c.screen.querySelector('#starBtn');
  const starred = (p.stars||[]).includes(q.number);
  starBtn.classList.toggle('on', starred);
  starBtn.querySelector('svg').outerHTML = starred ? icons.starFill : icons.star;
}

function onKey(e){
  const c = state.current; if (!c) return;
  const pages = c.screen.querySelector('#pages'); if (!pages) return;
  if (e.key === 'ArrowRight') { e.preventDefault(); pages.scrollBy({left: pages.clientWidth, behavior:'smooth'}); }
  if (e.key === 'ArrowLeft')  { e.preventDefault(); pages.scrollBy({left:-pages.clientWidth, behavior:'smooth'}); }
  if (e.key === 'Escape')     { popScreen(); }
}

function addEdgeBack(screen){
  let startX = 0, tracking = false, startT = 0;
  screen.addEventListener('touchstart', e => {
    if (e.touches[0].clientX < 18) { tracking = true; startX = e.touches[0].clientX; startT = Date.now(); }
  }, { passive: true });
  screen.addEventListener('touchmove', e => {
    if (!tracking) return;
    const dx = e.touches[0].clientX - startX;
    if (dx > 10) screen.style.transform = `translate3d(${Math.min(dx, window.innerWidth)}px,0,0)`;
  }, { passive: true });
  screen.addEventListener('touchend', e => {
    if (!tracking) return;
    const dx = (e.changedTouches[0]?.clientX || 0) - startX;
    const dt = Date.now() - startT;
    screen.style.transform = '';
    tracking = false;
    if (dx > window.innerWidth * 0.35 || (dx > 80 && dt < 250)) popScreen();
  });
}

/* ===================================================================
   Sheets (jump / mode / theme)
   =================================================================== */
function openJumpSheet(){
  const c = state.current; if (!c) return;
  const p = progressFor(c.examCode, c.code);
  const total = c.data.questions.length;
  // Build subject chips
  const subjMap = new Map();
  c.data.questions.forEach((q, idx) => {
    const subj = (q.subject || '').replace(/^\d+과목\s*:\s*/, '').trim();
    if (!subj) return;
    if (!subjMap.has(subj)) subjMap.set(subj, idx);
  });
  showSheet('문제 바로가기', () => {
    const wrap = document.createElement('div');
    if (subjMap.size > 1) {
      const chips = document.createElement('div');
      chips.className = 'subj-chips';
      for (const [subj, firstIdx] of subjMap) {
        const c2 = document.createElement('button');
        c2.className = 'chip';
        c2.textContent = subj;
        c2.onclick = () => {
          closeSheet();
          const pages = state.current.screen.querySelector('#pages');
          pages.scrollTo({ left: firstIdx * pages.clientWidth, behavior: 'smooth' });
        };
        chips.appendChild(c2);
      }
      wrap.appendChild(chips);
    }
    const body = document.createElement('div');
    body.className = 'numpad';
    for (let i=1; i<=total; i++){
      const q = c.data.questions[i-1];
      const picked = p.answers[q.number];
      const done = picked != null;
      const wrong = done && picked !== q.answer;
      const cls = [
        done && !wrong ? 'done' : '',
        wrong ? 'wrong' : '',
        (p.stars||[]).includes(q.number) ? 'starred' : '',
      ].join(' ').trim();
      const b = document.createElement('button');
      b.className = cls;
      b.textContent = i;
      b.onclick = () => {
        closeSheet();
        const pages = c.screen.querySelector('#pages');
        pages.scrollTo({ left: (i-1) * pages.clientWidth, behavior: 'smooth' });
      };
      body.appendChild(b);
    }
    wrap.appendChild(body);
    return wrap;
  });
}

      startExamTimer();

}

/* ---- share / completion / exam timer ---- */
function legacyCopy(text){
  try {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    return ok;
  } catch { return false; }
}
async function shareCurrent(){
  const c = state.current; if (!c) { toast('퀴즈에서 공유하세요'); return; }
  const exam = state.examByCode.get(c.examCode);
  const url = `${location.origin}/exam/${c.examCode}/${c.code}`;
  const text = `${exam?.name || ''} ${c.code.slice(0,4)}.${c.code.slice(4,6)}.${c.code.slice(6,8)} 기출`;
  if (navigator.share) {
    try { await navigator.share({ title: '기출 CBT', text, url }); }
    catch { /* user cancel — silent */ }
    return;
  }
  try {
    await navigator.clipboard.writeText(url);
    toast('링크 복사됨');
  } catch {
    if (legacyCopy(url)) toast('링크 복사됨');
    else toast('복사 실패 — 주소창에서 직접 복사해주세요');
  }
}

function maybeShowCompletion(c, p){
  const total = c.data.questions.length;
  const answered = Object.keys(p.answers || {}).length;
  if (answered < total) return;
  if (c._completionShown) return;
  c._completionShown = true;
  showCompletion(c, p);
}

function showCompletion(c, p){
  const total = c.data.questions.length;
  const wrongs = (p.wrongs || []).length;
  const correct = total - wrongs;
  const pct = Math.round(correct * 100 / total);
  stopExamTimer();
  showSheet(c.mode === 'exam' ? '모의시험 결과' : '풀이 완료', () => {
    const div = document.createElement('div');
    div.innerHTML = `
      <div class="completion">
        <div class="comp-pct">${pct}<small>%</small></div>
        <div class="comp-line">${correct} / ${total} 정답${wrongs ? ` · 오답 ${wrongs}` : ''}</div>
        ${wrongs ? `<button class="r-primary" id="compReview">틀린 문제 다시 보기</button>` : ''}
        <div class="comp-actions">
          <button class="r-soft" id="compRedo">다시 풀기</button>
          <button class="r-soft" id="compShare">공유</button>
          <button class="r-soft" id="compExit">목록으로</button>
        </div>
      </div>
    `;
    div.querySelector('#compReview')?.addEventListener('click', () => {
      closeSheet();
      const wrongIdx = c.data.questions.findIndex(q => (p.wrongs||[]).includes(q.number));
      if (wrongIdx >= 0) {
        const $pages = c.screen.querySelector('#pages');
        $pages.scrollTo({ left: wrongIdx * $pages.clientWidth, behavior: 'smooth' });
      }
    });
    div.querySelector('#compRedo').onclick = () => { closeSheet(); confirmRedo(); };
    div.querySelector('#compShare').onclick = () => { closeSheet(); shareCurrent(); };
    div.querySelector('#compExit').onclick = () => { closeSheet(); popScreen(); };
    return div;
  });
}

let _examTimerId = null;
function startExamTimer(){
  stopExamTimer();
  const c = state.current; if (!c) return;
  const min = c.examMin || 90;
  c.examEndAt = Date.now() + min * 60 * 1000;
  const el = c.screen.querySelector('#quizTimer');
  if (!el) return;
  el.hidden = false;
  const tick = () => {
    const left = Math.max(0, c.examEndAt - Date.now());
    const m = Math.floor(left / 60000);
    const s = Math.floor((left % 60000) / 1000);
    el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    el.classList.toggle('warn', left > 0 && left < 5 * 60000);
    if (left <= 0) {
      stopExamTimer();
      const p = progressFor(c.examCode, c.code);
      maybeShowCompletion(c, p);
    }
  };
  tick();
  _examTimerId = setInterval(tick, 1000);
}
function stopExamTimer(){
  if (_examTimerId) { clearInterval(_examTimerId); _examTimerId = null; }
  const c = state.current;
  const el = c?.screen?.querySelector('#quizTimer');
  if (el) { el.hidden = true; el.classList.remove('warn'); }
}

function openThemeSheet(){
  showSheet('테마', () => {
    const div = document.createElement('div');
    div.innerHTML = `<div class="sheet-row">
      <span class="l">화면</span>

function showSheet(title, bodyFn){
  closeSheet();
  const bg = document.createElement('div');
  bg.className = 'sheet-backdrop';
  bg.onclick = closeSheet;
  document.body.appendChild(bg);
  const sheet = document.createElement('div');

  sheet.innerHTML = `<div class="sheet-handle"></div><h2>${title}</h2>`;
  sheet.appendChild(bodyFn());
  document.body.appendChild(sheet);
}
function closeSheet(){
  document.querySelectorAll('.sheet, .sheet-backdrop').forEach(el => {
    el.classList.add('closing');
    el.addEventListener('animationend', () => el.remove(), { once: true });
    // ensure removal even if anim conflicts
    setTimeout(()=>el.remove(), 500);
  });
}

/* ===================================================================
   Helpers
   =================================================================== */
function iconTheme(t){
  if (t==='dark') return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  if (t==='light') return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 000 18"/></svg>';
}
function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}
function emptyCard(title, sub){
  return `<div class="empty"><span class="ideo">空</span><h4>${title}</h4><p>${sub || ''}</p></div>`;
}
let toastTimer;
function toast(msg){
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id='toast'; t.className='toast'; document.body.appendChild(t); }
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 1300);
}
function toastAction(msg, btnLabel, onClick){
  // Sticky toast with action button (for SW updates etc)
  let t = document.getElementById('toast-action');
  if (t) t.remove();
  t = document.createElement('div');
  t.id = 'toast-action'; t.className = 'toast-action';
  t.innerHTML = `<span>${escapeHtml(msg)}</span><button>${escapeHtml(btnLabel)}</button>`;
  t.querySelector('button').onclick = () => { try { onClick(); } finally { t.remove(); } };
  document.body.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
}
function haptic(kind){
  if (!navigator.vibrate) return;
  if (kind === 'correct') navigator.vibrate(10);
  else if (kind === 'wrong') navigator.vibrate([20, 30, 20]);
  else if (kind === 'tap') navigator.vibrate(8);
}
function attachScrollShadow(scrollId, navId){
  const s = document.getElementById(scrollId);
  const n = document.getElementById(navId);
  if (!s || !n) return;
  s.addEventListener('scroll', () => n.classList.toggle('is-scrolled', s.scrollTop > 4), { passive: true });
}

/* ===================================================================
   Router — path-based, syncs with screen stack
   =================================================================== */
let _navInternal = false;

function pathForState(s) {
  if (!s) return '/';
  if (s.type === 'session') return `/exam/${s.exam}`;
  if (s.type === 'quiz')    return `/exam/${s.exam}/${s.session}`;
  return '/';
}

function pushRoute(state) {
  const path = pathForState(state);
  if (location.pathname === path) return;
  const depth = (history.state?.depth || 0) + 1;
  history.pushState({ ...state, depth }, '', path);
}

window.addEventListener('popstate', () => {
  // Browser back/forward — pop visible screens to match URL depth
  const targetDepth = history.state?.depth || 0;
  const stack = document.getElementById('stack');
  _navInternal = true;
  while (stack.children.length - 1 > targetDepth) {
    doPopScreen();
  }
  _navInternal = false;
  // If user navigated forward to a deeper URL we don't have on stack,
  // we don't auto-rebuild here (rare edge case).
});

async function initRoute() {
  const segs = location.pathname.split('/').filter(Boolean);
  history.replaceState({ type: 'home', depth: 0 }, '', '/');
  if (segs[0] !== 'exam' || !segs[1]) return;
  await loadExams().catch(()=>{});
  if (!state.examByCode.has(segs[1])) return;
  await openSessionList(segs[1]);
  if (segs[2]) {
    try {
      await loadSessions(segs[1]);
      if (state.sessionMap.get(segs[1])?.has(segs[2])) {
        await openQuiz(segs[1], segs[2]);
      }
    } catch {}
  }
}

/* ---- boot (at end so all const bindings are live) ---- */
loadAdSense();
await bootUI();
bindTabs();
showTab('home');
await initRoute();

// expose select helpers for debugging / external automation
window.__cbt = { openImportSheet, applyDump, buildDump, computeStats, backupCurrent };

if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      const reg = await navigator.serviceWorker.register('/sw.js');
      const promptUpdate = (sw) => {
        toastAction('새 버전이 있어요', '새로고침', () => {
          sw.postMessage('SKIP_WAITING');
        });
      };
      if (reg.waiting) promptUpdate(reg.waiting);
      reg.addEventListener('updatefound', () => {
        const sw = reg.installing;
        if (!sw) return;
        sw.addEventListener('statechange', () => {
          if (sw.state === 'installed' && navigator.serviceWorker.controller) {
            promptUpdate(sw);
          }
        });
      });
      let reloaded = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (reloaded) return; reloaded = true;
        location.reload();
      });
    } catch {}
  });
}
